name: privacy-ci

# 双栈分别构建 + 测试 + 镜像（各自独立，互不阻塞）。
# 红线：仅用脱敏占位（acme / tenant-demo / example.com），无任何真实数据。
#
# Java 栈依赖主仓 libs-java（io.hashmatrix:*）发布在 GitHub Packages，故构建需制品仓访问：
# 仓库 URL 在 orchestrator-java/ci-settings.xml 声明，凭据经 env 注入（PACKAGES_TOKEN || GITHUB_TOKEN）。
# 若包对本仓不可见，需改用具备 read:packages 的 PAT（仓库 secret PACKAGES_TOKEN）或开放包可见性。

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 镜像发布到 ghcr 需 packages:write（仅 push main 时实际推送，见各 build 步骤的 push 条件）。
permissions:
  contents: read
  packages: write

# 镜像命名/标签策略（对齐主仓 deploy 约定）：
#   ghcr.io/hashmatrixdata/privacy-{engine,orchestrator-java}
#   移动 tag 0.1.0-SNAPSHOT（push main 覆盖，dev pullPolicy:Always 跟最新）
#   不可变 tag 0.1.0-<sha>（pin / prod 回滚）
env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/hashmatrixdata/privacy
  MOVING_TAG: "0.1.0-SNAPSHOT"

jobs:
  engine-py:
    name: engine-py · uv + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine-py
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
      - name: Sync deps
        run: uv sync
      - name: Test
        run: uv run pytest -q
      - name: Log in to ghcr（仅 push main 推送）
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build（PR 仅构建校验 / push main 构建并推送）
        uses: docker/build-push-action@v6
        with:
          context: engine-py
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-engine:${{ env.MOVING_TAG }}
            ${{ env.IMAGE_PREFIX }}-engine:0.1.0-${{ github.sha }}

  orchestrator-java:
    name: orchestrator-java · mvn package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator-java
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      # ci-settings.xml 声明 GitHub Packages 仓库 URL（解析 io.hashmatrix 父 POM/BOM/starter）+ 凭据
      - name: Build + test（从制品仓解析 io.hashmatrix:*）
        env:
          PACKAGES_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./mvnw -s ci-settings.xml -B -ntp package
      - name: Log in to ghcr（仅 push main 推送）
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build runtime image（消费上一步 fat-jar；PR 仅校验 / push main 推送）
        uses: docker/build-push-action@v6
        with:
          context: orchestrator-java
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-orchestrator-java:${{ env.MOVING_TAG }}
            ${{ env.IMAGE_PREFIX }}-orchestrator-java:0.1.0-${{ github.sha }}

  psi-sample:
    name: psi-sample · docker-compose 端到端
    runs-on: ubuntu-latest
    needs: [engine-py, orchestrator-java]
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Pre-build orchestrator fat-jar（运行镜像需要）
        working-directory: orchestrator-java
        env:
          PACKAGES_ACTOR: ${{ github.actor }}
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: ./mvnw -s ci-settings.xml -B -ntp -DskipTests package
      - name: Up + run minimal PSI sample
        run: >
          docker compose -f docker-compose.local.yml --profile sample up
          --build --abort-on-container-exit --exit-code-from psi-sample
      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.local.yml --profile sample down -v
