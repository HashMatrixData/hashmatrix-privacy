spring:
  application:
    name: privacy-orchestrator

server:
  port: ${SERVER_PORT:8086}

# 计算引擎地址：本地直跑默认 localhost；docker-compose 内经环境变量覆盖为 http://engine-py:8087
engine:
  base-url: ${ENGINE_BASE_URL:http://localhost:8087}

# 健康检查暴露给 docker / k8s 探针
management:
  # 管理/actuator 独立端口（对齐平台基线：应用 80xx / 管理 90xx）
  server:
    port: ${MANAGEMENT_SERVER_PORT:9086}
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
