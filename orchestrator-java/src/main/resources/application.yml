spring:
  application:
    name: privacy-orchestrator

server:
  port: 8080

# 计算引擎地址：本地直跑默认 localhost；docker-compose 内经环境变量覆盖为 http://engine-py:8000
engine:
  base-url: ${ENGINE_BASE_URL:http://localhost:8000}

# 健康检查暴露给 docker / k8s 探针
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
